services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pfms
      POSTGRES_USER: pfms
      POSTGRES_PASSWORD: pfms_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfms"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://pfms:pfms_password@postgres:5432/pfms
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      VISION_PROVIDER: ${VISION_PROVIDER:-zai}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: 20
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:-pfms-prod-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
